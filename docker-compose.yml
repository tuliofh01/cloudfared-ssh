version: "3.8"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ~/.cloudflared:/root/.cloudflared
      - ~/.cloudfared-tunneling:/root/.cloudfared-tunneling
    environment:
      - TUNNEL_SECRET=${TUNNEL_SECRET:-}
      - WORKER_URL=${WORKER_URL:-https://nxs1.tuliofh01.workers.dev}
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.14.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  logstash:
    image: logstash:8.14.0
    ports:
      - "5044:5044"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ~/.cloudfared-tunneling/logs:/logs
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      - elasticsearch
    restart: unless-stopped

  kibana:
    image: kibana:8.14.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  es_data:
