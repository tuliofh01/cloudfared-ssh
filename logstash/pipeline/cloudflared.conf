input {
  file {
    path => "/logs/tunnel.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["cloudflared"]
  }
}

filter {
  grok {
    match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} - %{DATA:logger} - %{LOGLEVEL:level} - %{GREEDYDATA:message}" }
  }
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
  mutate {
    remove_field => ["timestamp", "host", "path"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "cloudfared-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
